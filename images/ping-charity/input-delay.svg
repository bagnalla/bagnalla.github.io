<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 238" role="img" aria-labelledby="title desc">
  <title id="title">Input delay with synchronized clocks</title>
  <desc id="desc">A client synchronized with the server schedules input in the server future, causing local input delay.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d8d1a1"/>
    </marker>
    <style>
      .bg{fill:#11151c}.axis{stroke:#b7beb5;stroke-width:2}.dash{stroke:#1f5a2e;stroke-width:1;stroke-dasharray:5 6}
      .text{fill:#e6f2e7;font:16px system-ui,-apple-system,Segoe UI,sans-serif}.small{fill:#a5b8aa;font:14px system-ui,-apple-system,Segoe UI,sans-serif}
      .server{fill:#d7d8cf}.client{fill:#c4d141}.event{fill:#f4ec38}.packet{stroke:#d8d1a1;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .delay{fill:#d7562f;opacity:.28}.label{fill:#ff9a78;font:14px system-ui,-apple-system,Segoe UI,sans-serif}
    </style>
  </defs>
  <rect class="bg" width="600" height="238" rx="10"/>

  <g transform="translate(74,0)">
    <line class="axis" x1="0" y1="40" x2="480" y2="40"/>
    <line class="axis" x1="0" y1="170" x2="480" y2="170"/>
    <text class="text" x="-58" y="45">Server</text>
    <text class="text" x="-50" y="175">Client</text>

    <g>
      <line class="dash" x1="0" y1="18" x2="0" y2="195"/>
      <line class="dash" x1="200" y1="18" x2="200" y2="195"/>
      <line class="dash" x1="400" y1="18" x2="400" y2="195"/>
      <text class="small" x="-11" y="224">S</text>
      <text class="small" x="171" y="224">S + 50 ms</text>
      <text class="small" x="367" y="224">S + 100 ms</text>
    </g>

    <rect class="delay" x="0" y="146" width="200" height="48" rx="6"/>
    <text class="label" x="42" y="141">local input delay</text>

    <circle class="event" cx="0" cy="170" r="7"/>
    <text class="small" x="-22" y="158">press</text>

    <circle class="client" cx="200" cy="170" r="7"/>
    <text class="small" x="136" y="202">client applies turn</text>

    <circle class="server" cx="200" cy="40" r="7"/>
    <text class="small" x="133" y="26">server receives</text>

    <circle class="server" cx="400" cy="40" r="7"/>
    <text class="small" x="316" y="26">server update returns</text>

    <path class="packet" d="M8,166 C82,124 116,86 192,44"/>
    <path class="packet" d="M208,44 C285,86 320,124 392,166"/>

    <text class="small" x="15" y="115">input travels to server</text>
    <text class="small" x="238" y="115">confirmation travels back</text>
  </g>
</svg>
