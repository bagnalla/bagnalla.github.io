<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 14 600 192" role="img" aria-labelledby="title desc">
  <title id="title">Rollback leniency for Alice</title>
  <desc id="desc">Alice presses at server time S, the server receives the command at S plus 50 milliseconds, then accepts it as if it happened at S. Bob receives it while his local clock reads S plus 150.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d8d1a1"/>
    </marker>
    <marker id="rollback-arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d7562f"/>
    </marker>
    <style>
      .panel{fill:#171d27;stroke:#2d3442;stroke-width:1}.dash{stroke:#1f5a2e;stroke-width:1;stroke-dasharray:5 6}
      .row{stroke:#183421;stroke-width:1}.text{fill:#e6f2e7;font:16px system-ui,-apple-system,Segoe UI,sans-serif}
      .small{fill:#a5b8aa;font:14px system-ui,-apple-system,Segoe UI,sans-serif}.tiny{fill:#a5b8aa;font:12px system-ui,-apple-system,Segoe UI,sans-serif;paint-order:stroke;stroke:#171d27;stroke-linejoin:round;stroke-width:3px}
      .packet{stroke:#d8d1a1;stroke-width:2;fill:none;marker-end:url(#arrow)}.rollback{stroke:#d7562f;stroke-width:2;fill:none;marker-end:url(#rollback-arrow)}
      .alice{fill:#c4d141}.server{fill:#d7d8cf}.bob{fill:#d7562f}.event{fill:#f4ec38}.accepted{fill:#d7562f}
      .badge{fill:#08100c;stroke:#244f30;stroke-width:1}.age{fill:#d8d1a1;font:13px ui-monospace,SFMono-Regular,Menlo,monospace}
      .note{fill:#d8d1a1;font:13px ui-monospace,SFMono-Regular,Menlo,monospace}
    </style>
  </defs>
  <g transform="translate(26,14)">
    <rect class="panel" x="0" y="0" width="548" height="192" rx="8"/>
    <text class="note" x="16" y="28">Alice lead = 0 ms, Bob lead = 50 ms</text>

    <line class="row" x1="98" y1="62" x2="510" y2="62"/>
    <line class="row" x1="98" y1="104" x2="510" y2="104"/>
    <line class="row" x1="98" y1="146" x2="510" y2="146"/>
    <text class="small" x="18" y="67">Alice</text>
    <text class="small" x="18" y="109">Server</text>
    <text class="small" x="18" y="151">Bob</text>

    <line class="dash" x1="112" y1="48" x2="112" y2="154"/>
    <line class="dash" x1="296" y1="48" x2="296" y2="154"/>
    <line class="dash" x1="480" y1="48" x2="480" y2="154"/>
    <text class="tiny" x="18" y="174">server time</text>
    <text class="tiny" x="104" y="174">S</text>
    <text class="tiny" x="270" y="174">S + 50</text>
    <text class="tiny" x="451" y="174">S + 100</text>

    <path class="packet" d="M119,65 C174,76 231,92 289,102"/>
    <path class="packet" d="M303,106 C357,117 418,132 473,144"/>
    <path class="rollback" d="M287,104 C236,134 170,134 121,107"/>

    <circle class="alice" cx="112" cy="62" r="7"/>
    <circle class="event" cx="112" cy="62" r="4"/>
    <text class="tiny" x="124" y="57">press</text>
    <text class="tiny" x="124" y="72">cmd time S</text>

    <circle class="server" cx="296" cy="104" r="7"/>
    <text class="tiny" x="308" y="99">server receives</text>
    <text class="tiny" x="308" y="114">at S + 50</text>

    <circle class="accepted" cx="112" cy="104" r="7"/>
    <text class="tiny" x="124" y="112">accepts at S</text>
    <text class="tiny" x="176" y="140">rollback 50 ms</text>

    <circle class="bob" cx="480" cy="146" r="7"/>
    <text class="tiny" x="358" y="134">Bob receives</text>
    <text class="tiny" x="358" y="149">Bob clock S + 150</text>
    <rect class="badge" x="414" y="84" width="90" height="24" rx="5"/>
    <text class="age" x="425" y="101">age 150 ms</text>
  </g>
</svg>
